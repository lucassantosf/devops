apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-azul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-color
  template:
    metadata:
      labels:
        app: web-color
    spec:
      containers:
      - name: web-container
        # Imagem moderna, compatível e visualmente rica
        image: stefanprodan/podinfo:latest
        ports:
        - containerPort: 9898
---
apiVersion: v1
kind: Service
metadata:
  name: service-color
spec:
  type: NodePort
  selector:
    app: web-color
  ports:
  - port: 80
    targetPort: 9898
    nodePort: 30001