apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webcolor-incluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lucassantosf/k8s-web-color-page.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: webcolor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true