apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: webcolor
spec:
  metrics:
    - name: success-rate
      interval: 30s
      count: 4
      successCondition: result >= 0.9 
      failureCondiction: result < 0.8
      provider: 
        prometheus:
          address: http://prometheus-server.monitoramento.svc.cluster.local 
        query:|
          scalar(
            sum(rate(flask_http_request_total{app="webcolor",status=~"2.."}[2m]))
            /
            sum(rate(flask_http_request_total{app="webcolor"][2m]))
          )

-----
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: webcolor
spec:
  replicas: 10
  selector:
    matchLabels:
      app: webcolor
  template:
    metadata:
      labels:
        app: webcolor
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '80'
    spec:
      containers:
      - name: webcolor
        image: fabricioveronez/web-color:green
        resources: {}
        ports: 
        - containerPort: 80
  strategy:
    canary: 
      steps:
      - setWeight: 25
      - analysis:
          template: 
          - templateName : webcolor-analysis
      - setWeight: 50
      - analysis:
          template: 
          - templateName : webcolor-analysis
      - setWeight: 100
---
apiVersion: v1 
kind: Service 
metadata:
  name: webcolor
spec:
  selector: 
    app: webcolor
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer