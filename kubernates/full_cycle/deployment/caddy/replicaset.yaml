apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: caddy-replicaset
spec:
  replicas: 10
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
      - name: caddy
        image: caddy:latest
        ports:
        - containerPort: 80