apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o ./output/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: mongo
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mongo
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o ./output/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: mongo
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: docker-env-mongo-production-env
          image: codewithdan/mongo
          name: mongo
          ports:
            - containerPort: 27017
              protocol: TCP
      restartPolicy: Always
