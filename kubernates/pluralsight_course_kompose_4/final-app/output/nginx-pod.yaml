apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o ./output/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: nginx
  name: nginx
spec:
  containers:
    - image: codewithdan/nginx
      name: nginx
      ports:
        - containerPort: 80
          protocol: TCP
        - containerPort: 443
          protocol: TCP
  restartPolicy: OnFailure
